  const SPEED = 70; // 切り替え速度(ミリ秒)。小さいほど速い

  const pic = document.getElementById('pic');
  const stage = document.getElementById('stage');
  const msg = document.getElementById('msg');
  let spinning = false, timer = null;

  function show() {
    const i = Math.floor(Math.random() * images.length);
    pic.src = images[i];
  }
  show();

  stage.addEventListener('click', () => {
    if (!spinning) {
      spinning = true;
      msg.textContent = "タップして止める！";
      timer = setInterval(show, SPEED);
    } else {
      spinning = false;
      clearInterval(timer);
      show();
      msg.textContent = "決定！もう一度タップで再スタート";
    }
  });
</script>
