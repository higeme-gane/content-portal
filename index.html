<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>コンテンツポータル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
        .filter-btn.active {
            background-color: #0ea5e9;
            color: white;
            border-color: #0ea5e9;
        }
        .category-badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-weight: 600;
            letter-spacing: 0.025em;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <!-- Header -->
    <header class="border-b border-zinc-800 bg-zinc-950/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-sky-500 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-book text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-semibold tracking-tight">コンテンツポータル</h1>
                    <p class="text-xs text-zinc-500 -mt-0.5">医療マネジメント × 思考の記録</p>
                </div>
            </div>
            
            <div class="flex items-center gap-x-2 text-sm">
                <a href="https://github.com" target="_blank" 
                   class="px-4 py-2 text-zinc-400 hover:text-zinc-200 flex items-center gap-x-2 transition-colors">
                    <i class="fa-brands fa-github"></i>
                    <span class="hidden sm:inline">GitHub</span>
                </a>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-6 pt-10 pb-20">
        
        <!-- 見出し -->
        <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-4 mb-8">
            <div>
                <h2 class="text-4xl font-semibold tracking-tight">すべてのコンテンツ</h2>
                <p id="item-count" class="text-zinc-400 mt-2">読み込み中...</p>
            </div>

            <!-- 検索 + フィルター -->
            <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
                <!-- 検索 -->
                <div class="relative flex-1 md:w-80">
                    <i class="fa-solid fa-search absolute left-4 top-3.5 text-zinc-500"></i>
                    <input id="search-input" type="text" placeholder="タイトルや説明で検索..." 
                           class="w-full pl-11 pr-4 py-3 bg-zinc-900 border border-zinc-700 rounded-3xl text-sm focus:outline-none focus:border-sky-500 placeholder:text-zinc-500">
                </div>

                <!-- カテゴリーフィルター -->
                <div class="flex gap-2 bg-zinc-900 p-1.5 rounded-3xl border border-zinc-700">
                    <button onclick="filterByCategory('all')" id="filter-all"
                            class="filter-btn active px-5 py-2 text-sm font-medium rounded-3xl transition-colors">すべて</button>
                    <button onclick="filterByCategory('blog')" id="filter-blog"
                            class="filter-btn px-5 py-2 text-sm font-medium rounded-3xl flex items-center gap-x-2 transition-colors">
                        <i class="fa-solid fa-blog text-sky-400"></i>
                        <span>ブログ</span>
                    </button>
                    <button onclick="filterByCategory('apps')" id="filter-apps"
                            class="filter-btn px-5 py-2 text-sm font-medium rounded-3xl flex items-center gap-x-2 transition-colors">
                        <i class="fa-solid fa-laptop-code text-emerald-400"></i>
                        <span>アプリ</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- コンテンツグリッド -->
        <div id="content-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        
        <div id="no-results" class="hidden text-center py-16">
            <i class="fa-solid fa-search text-4xl text-zinc-700 mb-4"></i>
            <p class="text-zinc-400">該当するコンテンツが見つかりませんでした。</p>
        </div>
    </div>

    <footer class="border-t border-zinc-800 py-8">
        <div class="max-w-7xl mx-auto px-6 text-center text-xs text-zinc-500">
            <p>GitHub Pagesで運用中</p>
        </div>
    </footer>

    <script>
        let allItems = [];
        let currentFilter = 'all';
        let currentSearch = '';

        async function loadData() {
            try {
                const res = await fetch('./data.json');
                if (!res.ok) throw new Error();
                allItems = await res.json();
                renderItems();
            } catch (e) {
                document.getElementById('content-grid').innerHTML = 
                    `<div class="col-span-full text-center py-12 text-red-400">データの読み込みに失敗しました。</div>`;
            }
        }

        function formatDate(dateStr) {
            return new Date(dateStr).toLocaleDateString('ja-JP', { 
                year: 'numeric', month: 'long', day: 'numeric' 
            });
        }

        function getCategoryInfo(category) {
            const map = {
                blog:  { label: 'ブログ', color: 'bg-sky-900 text-sky-300' },
                apps:  { label: 'アプリ', color: 'bg-emerald-900 text-emerald-300' }
            };
            return map[category] || { label: category, color: 'bg-zinc-700 text-zinc-300' };
        }

        function renderItems() {
            const grid = document.getElementById('content-grid');
            const noRes = document.getElementById('no-results');
            grid.innerHTML = '';
            noRes.classList.add('hidden');

            let items = [...allItems];

            // 検索フィルター
            if (currentSearch) {
                const q = currentSearch.toLowerCase();
                items = items.filter(item => 
                    item.title.toLowerCase().includes(q) || 
                    (item.description && item.description.toLowerCase().includes(q))
                );
            }

            // カテゴリーフィルター
            if (currentFilter !== 'all') {
                items = items.filter(item => item.category === currentFilter);
            }

            // 日付降順ソート
            items.sort((a, b) => b.date.localeCompare(a.date));

            if (items.length === 0) {
                noRes.classList.remove('hidden');
                document.getElementById('item-count').textContent = '0件';
                return;
            }

            document.getElementById('item-count').textContent = `${items.length}件表示中（最新順）`;

            items.forEach(item => {
                const cat = getCategoryInfo(item.category);
                
                const card = `
                    <div class="card bg-zinc-900 border border border-zinc-600 shadow-sm rounded-3xl p-6 flex flex-col h-full">
                        <div class="flex items-start justify-between mb-4">
                            <span class="category-badge ${cat.color}">
                                ${cat.label}
                            </span>
                            <span class="text-xs text-zinc-500 font-mono tracking-tight">${formatDate(item.date)}</span>
                        </div>
                        
                        <h3 class="font-semibold text-xl leading-snug mb-3 pr-2">${item.title}</h3>
                        
                        ${item.description ? 
                            `<p class="text-zinc-400 text-sm line-clamp-3 flex-grow mb-6">${item.description}</p>` : 
                            `<div class="flex-grow"></div>`}
                        
                        <div class="mt-auto pt-4 border-t border-zinc-800">
                            <a href="${item.url}" target="_blank" 
                               class="inline-flex items-center justify-center w-full gap-x-2 px-5 py-3 bg-white text-zinc-900 hover:bg-zinc-100 text-sm font-medium rounded-2xl transition-all active:scale-[0.985]">
                                開く
                                <i class="fa-solid fa-arrow-up-right-from-square text-xs"></i>
                            </a>
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', card);
            });
        }

        function filterByCategory(category) {
            currentFilter = category;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            
            let activeBtn = document.getElementById(`filter-${category}`);
            if (!activeBtn) activeBtn = document.getElementById('filter-all');
            activeBtn.classList.add('active');
            
            renderItems();
        }

        function init() {
            // 検索
            document.getElementById('search-input').addEventListener('input', (e) => {
                currentSearch = e.target.value.trim();
                renderItems();
            });

            // 初期フィルターボタン
            document.getElementById('filter-all').classList.add('active');
            
            loadData();
        }

        window.onload = init;
    </script>
</body>
</html>
